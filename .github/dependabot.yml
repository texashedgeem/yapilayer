version: 2
updates:
  # Major version upgrades are deliberate engineering decisions (recorded in
  # DECISIONS.md / ADRs), not automated PRs — Dependabot proposes minor/patch only.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
