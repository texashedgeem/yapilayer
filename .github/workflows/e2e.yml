name: e2e

# Full-stack verification: builds the compose stack, then runs the Playwright
# browser suite and the SDK contract tests against real containers.
# Main-branch pushes only — compose image builds are too slow for every PR.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  full-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build and start the stack
        working-directory: docker
        run: docker compose up -d --build

      - name: Wait for all services healthy
        working-directory: docker
        run: |
          for i in $(seq 1 60); do
            healthy=$(docker compose ps --format json | grep -c '"Health":"healthy"' || true)
            [ "$healthy" = "5" ] && echo "all healthy" && exit 0
            sleep 10
          done
          echo "services did not become healthy" && docker compose ps && docker compose logs --tail 50 && exit 1

      - name: Install workspaces and Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Contract tests (generated SDK against live stack)
        working-directory: tests/contract
        run: npm test

      - name: Playwright e2e (nginx-served demos)
        working-directory: tests/e2e
        run: npx playwright test

      - name: Teardown
        if: always()
        working-directory: docker
        run: docker compose down
