name: release

# Stub (Milestone 1): builds artifacts on version tags.
# Completed in Milestone 9 with changelog automation and SDK publishing.

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build release artifacts
        run: ./gradlew build
      - name: Upload boot jars
        uses: actions/upload-artifact@v4
        with:
          name: yapilayer-${{ github.ref_name }}
          path: |
            platform/platform-bootstrap/build/libs/*.jar
            providers/mock-bank/mock-bank-simulator/build/libs/*.jar
