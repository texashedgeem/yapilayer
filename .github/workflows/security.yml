name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1" # weekly, Monday 05:30 UTC

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        if: matrix.language == 'java-kotlin'
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # java needs a traced manual build; JS/TS is scanned source-only
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}
      - name: Build for CodeQL (traced)
        if: matrix.language == 'java-kotlin'
        # --no-daemon so the CodeQL tracer sees the compiler; caches disabled so
        # compilation actually re-runs and gets traced
        run: ./gradlew --no-daemon --no-build-cache --no-configuration-cache clean compileJava
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (dependencies + Dockerfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
