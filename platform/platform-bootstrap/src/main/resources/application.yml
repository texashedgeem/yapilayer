spring:
  application:
    name: yapilayer-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/yapilayer}
    username: ${SPRING_DATASOURCE_USERNAME:yapilayer}
    password: ${SPRING_DATASOURCE_PASSWORD:yapilayer-dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

yapilayer:
  providers:
    mock-bank:
      base-url: ${YAPILAYER_PROVIDERS_MOCK_BANK_BASE_URL:http://localhost:8090}
  callback-url: ${YAPILAYER_CALLBACK_URL:http://localhost:8080/api/v1/callback}
