# Host ports per apisaurus docs/PORT-REGISTRY.md, ADR 0002 (project id 30
# for platform/postgres/mock-bank, 31/32 for the demo frontends). Only
# host-side mappings change for postgres/mock-bank/platform — internal
# container-to-container networking (service-name DNS) is unaffected by host
# port choices. ais-demo/pis-demo remap both sides to keep Vite's HMR
# websocket consistent with the externally-visible port.
name: yapilayer

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yapilayer
      POSTGRES_USER: yapilayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yapilayer-dev}
    ports:
      - "42230:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapilayer -d yapilayer"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mock-bank:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-bank
    ports:
      - "42730:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 12

  platform:
    build:
      context: ..
      dockerfile: docker/Dockerfile.platform
    environment:
      YAPILAYER_PROVIDERS_MOCK_BANK_BASE_URL: http://mock-bank:8090
      # Customer's browser reaches the simulator via the published host port
      YAPILAYER_PROVIDERS_MOCK_BANK_PUBLIC_BASE_URL: http://localhost:42730
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yapilayer
      SPRING_DATASOURCE_USERNAME: yapilayer
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-yapilayer-dev}
      YAPILAYER_CALLBACK_URL: http://localhost:42130/api/v1/callback
    ports:
      - "42130:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mock-bank:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 12

  ais-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      args:
        APP: ais-demo
        PORT: 42031
    ports:
      - "42031:42031"
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:42031/ > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  pis-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      args:
        APP: pis-demo
        PORT: 42032
    ports:
      - "42032:42032"
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:42032/ > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  postgres-data:
