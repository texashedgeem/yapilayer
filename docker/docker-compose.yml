name: yapilayer

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yapilayer
      POSTGRES_USER: yapilayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yapilayer-dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapilayer -d yapilayer"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mock-bank:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-bank
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 12

  platform:
    build:
      context: ..
      dockerfile: docker/Dockerfile.platform
    environment:
      YAPILAYER_PROVIDERS_MOCK_BANK_BASE_URL: http://mock-bank:8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yapilayer
      SPRING_DATASOURCE_USERNAME: yapilayer
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-yapilayer-dev}
      YAPILAYER_CALLBACK_URL: http://localhost:8080/api/v1/callback
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mock-bank:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres-data:
